<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>동물상 테스트 - 강아지상 vs 고양이상</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="top-nav">
        <a href="index.html" class="nav-link">홈으로 돌아가기</a>
        <button id="theme-toggle" type="button">다크 모드 켜기</button>
    </div>

    <!-- 동물상 테스트 (사진 업로드 방식) -->
    <div class="container animal-test-container">
        <h2>강아지상? 고양이상? 테스트</h2>
        <p class="subtitle">사진 파일을 업로드하여 테스트하세요.</p>
        
        <div class="upload-area" id="upload-area">
            <input type="file" id="image-input" accept="image/*" hidden>
            <div id="upload-label">
                <p>📸 클릭하여 분석할 사진 선택</p>
                <span style="font-size: 0.8rem; opacity: 0.7;">(이미지 파일을 선택해주세요)</span>
            </div>
            <img id="preview-image" style="display: none; max-width: 100%; border-radius: 10px; margin-top: 10px;">
        </div>

        <div id="loading-spinner" style="display: none; margin: 1rem 0;">
            <div class="spinner"></div>
            <p>AI가 분석 중입니다...</p>
        </div>

        <div id="result-container" style="display: none;">
            <h3 id="result-message"></h3>
            <div id="label-container"></div>
            <button id="retry-btn" type="button" style="margin-top: 1.5rem; padding: 10px 20px; font-size: 0.9rem;">다른 사진으로 다시하기</button>
        </div>
    </div>

    <!-- 스크립트 로드 -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
    <script src="main.js"></script>
</body>
</html>
