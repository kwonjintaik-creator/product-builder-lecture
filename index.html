<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lotto & Animal Face Test</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <button id="theme-toggle" type="button">다크 모드 켜기</button>

    <!-- 로또 번호 생성기 -->
    <div class="container">
        <h1>Lotto Number Generator</h1>
        <p class="subtitle">Generate 6 unique numbers from 1 to 45.</p>
        <button id="generator-btn" type="button">Generate Numbers</button>
        <div id="lotto-numbers" class="lotto-numbers" aria-live="polite"></div>
    </div>

    <!-- 동물상 테스트 -->
    <div class="container animal-test-container">
        <h2>강아지상? 고양이상? 테스트</h2>
        <p class="subtitle">사진을 업로드하여 나의 동물상을 확인해보세요!</p>

        <div class="upload-area" id="upload-area">
            <input type="file" id="image-input" accept="image/*" hidden>
            <div id="upload-label">
                <p>📸 클릭하여 사진을 업로드하세요</p>
            </div>
            <img id="preview-image" style="display: none; max-width: 100%; border-radius: 10px; margin-top: 10px;">
        </div>

        <div id="loading-spinner" style="display: none; margin: 1rem 0;">
            <div class="spinner"></div>
            <p>AI가 분석 중입니다...</p>
        </div>

        <div id="result-container" style="display: none;">
            <h3 id="result-message"></h3>
            <div id="label-container"></div>
            <button id="retry-btn" type="button" style="margin-top: 1.5rem; padding: 8px 16px; font-size: 0.9rem;">다시 시도하기</button>
        </div>
    </div>

    <div class="container partnership-container">
        <h2>제휴 문의</h2>
        <form action="https://formspree.io/f/mqeyonbj" method="POST" class="partnership-form">
            <div class="form-group">
                <label for="email">이메일 주소</label>
                <input type="email" name="email" id="email" placeholder="example@email.com" required>
            </div>
            <div class="form-group">
                <label for="message">문의 내용</label>
                <textarea name="message" id="message" rows="4" placeholder="문의하실 내용을 입력해주세요." required></textarea>
            </div>
            <button type="submit" id="submit-btn">문의 보내기</button>
        </form>
    </div>

    <div class="container disqus-container">
        <div id="disqus_thread"></div>
    </div>

    <!-- 스크립트 -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
    <script>
        /** Disqus 설정 생략 가능 혹은 유지 */
        (function() {
            var d = document, s = d.createElement('script');
            s.src = 'https://productbuilder-i3k7twg4sw.disqus.com/embed.js';
            s.setAttribute('data-timestamp', +new Date());
            (d.head || d.body).appendChild(s);
        })();
    </script>
    <script src="main.js"></script>
</body>
</html>

</body>
</html>
