<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lotto Number Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="top-nav">
        <a href="animal-test.html" class="nav-link">동물상 테스트</a>
        <button id="theme-toggle" type="button">다크 모드 켜기</button>
    </div>
    
    <!-- 로또 번호 생성기 -->
    <div class="container">
        <h1>Lotto Number Generator</h1>
        <p class="subtitle">Generate 6 unique numbers from 1 to 45.</p>
        <button id="generator-btn" type="button">Generate Numbers</button>
        <div id="lotto-numbers" class="lotto-numbers" aria-live="polite"></div>
    </div>

    <div class="container partnership-container">
        <h2>제휴 문의</h2>
        <form action="https://formspree.io/f/mqeyonbj" method="POST" class="partnership-form">
            <div class="form-group">
                <label for="email">이메일 주소</label>
                <input type="email" name="email" id="email" placeholder="example@email.com" required>
            </div>
            <div class="form-group">
                <label for="message">문의 내용</label>
                <textarea name="message" id="message" rows="4" placeholder="문의하실 내용을 입력해주세요." required></textarea>
            </div>
            <button type="submit" id="submit-btn">문의 보내기</button>
        </form>
    </div>

    <div class="container disqus-container">
        <div id="disqus_thread"></div>
    </div>

    <!-- 스크립트 로드 -->
    <script>
        (function() {
            var d = document, s = d.createElement('script');
            s.src = 'https://productbuilder-i3k7twg4sw.disqus.com/embed.js';
            s.setAttribute('data-timestamp', +new Date());
            (d.head || d.body).appendChild(s);
        })();
    </script>
    <script src="main.js"></script>
</body>
</html>
